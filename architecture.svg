<svg width="100%" viewBox="0 0 760 720" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>AgentLeash — contract architecture on Pharos</title>
  <desc>AgentRegistry stores identity and reputation. LeashGatedTransfer gates payments. Agent A calls LeashGatedTransfer, which resolves the username and checks score, then moves PHRS and records reputation before ETH leaves.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- OPTIMIZATION BADGES -->
  <rect x="30"  y="18" width="162" height="26" rx="6" fill="rgb(238,237,254)"/>
  <text x="111" y="31" text-anchor="middle" dominant-baseline="central" font-size="11" fill="rgb(60,52,137)" font-family="system-ui,sans-serif">uint64 packing → −40k gas</text>

  <rect x="202" y="18" width="166" height="26" rx="6" fill="rgb(238,237,254)"/>
  <text x="285" y="31" text-anchor="middle" dominant-baseline="central" font-size="11" fill="rgb(60,52,137)" font-family="system-ui,sans-serif">no duplicate username store</text>

  <rect x="378" y="18" width="168" height="26" rx="6" fill="rgb(238,237,254)"/>
  <text x="462" y="31" text-anchor="middle" dominant-baseline="central" font-size="11" fill="rgb(60,52,137)" font-family="system-ui,sans-serif">single SLOAD in recordTask</text>

  <rect x="556" y="18" width="168" height="26" rx="6" fill="rgb(238,237,254)"/>
  <text x="640" y="31" text-anchor="middle" dominant-baseline="central" font-size="11" fill="rgb(60,52,137)" font-family="system-ui,sans-serif">uint8 enum for events</text>

  <!-- OUTER CONTAINER: Pharos chain -->
  <rect x="20" y="62" width="720" height="600" rx="20" fill="rgb(8,80,65)" fill-opacity="0.08" stroke="rgb(93,202,165)" stroke-width="0.5"/>
  <text x="380" y="90"  text-anchor="middle" fill="rgb(159,225,203)" font-size="15" font-weight="600" font-family="system-ui,sans-serif">Pharos Atlantic Testnet</text>
  <text x="380" y="110" text-anchor="middle" fill="rgb(93,202,165)"  font-size="12" font-family="system-ui,sans-serif">EVM-compatible · Chain ID 688689 · SALI parallel execution</text>

  <!-- ─── CONTRACT 1: AgentRegistry ─── -->
  <rect x="40" y="130" width="300" height="320" rx="14" fill="rgb(60,52,137)" fill-opacity="0.12" stroke="rgb(175,169,236)" stroke-width="0.8"/>

  <text x="190" y="158" text-anchor="middle" fill="rgb(206,203,246)" font-size="15" font-weight="600" font-family="system-ui,sans-serif">AgentRegistry.sol</text>
  <text x="190" y="178" text-anchor="middle" fill="rgb(175,169,236)" font-size="12" font-family="system-ui,sans-serif">Identity + reputation store</text>

  <!-- Registry row 1 -->
  <rect x="58" y="192" width="264" height="50" rx="8" fill="rgb(60,52,137)" fill-opacity="0.22" stroke="rgb(175,169,236)" stroke-width="0.5"/>
  <text x="190" y="210" text-anchor="middle" fill="rgb(206,203,246)" font-size="12" font-weight="500" font-family="system-ui,sans-serif">register(prefix)</text>
  <text x="190" y="228" text-anchor="middle" fill="rgb(175,169,236)" font-size="11" font-family="system-ui,sans-serif">mint a unique .leash username</text>

  <!-- Registry row 2 -->
  <rect x="58" y="252" width="264" height="50" rx="8" fill="rgb(60,52,137)" fill-opacity="0.22" stroke="rgb(175,169,236)" stroke-width="0.5"/>
  <text x="190" y="270" text-anchor="middle" fill="rgb(206,203,246)" font-size="12" font-weight="500" font-family="system-ui,sans-serif">resolve() · reverseResolve()</text>
  <text x="190" y="288" text-anchor="middle" fill="rgb(175,169,236)" font-size="11" font-family="system-ui,sans-serif">username ↔ wallet address</text>

  <!-- Registry row 3 -->
  <rect x="58" y="312" width="264" height="50" rx="8" fill="rgb(60,52,137)" fill-opacity="0.22" stroke="rgb(175,169,236)" stroke-width="0.5"/>
  <text x="190" y="330" text-anchor="middle" fill="rgb(206,203,246)" font-size="12" font-weight="500" font-family="system-ui,sans-serif">getProfile() · getTopAgents()</text>
  <text x="190" y="348" text-anchor="middle" fill="rgb(175,169,236)" font-size="11" font-family="system-ui,sans-serif">view reads — no gas cost</text>

  <!-- Registry row 4 -->
  <rect x="58" y="372" width="264" height="50" rx="8" fill="rgb(60,52,137)" fill-opacity="0.22" stroke="rgb(175,169,236)" stroke-width="0.5"/>
  <text x="190" y="390" text-anchor="middle" fill="rgb(206,203,246)" font-size="12" font-weight="500" font-family="system-ui,sans-serif">record Payment/Task/Failure()</text>
  <text x="190" y="408" text-anchor="middle" fill="rgb(175,169,236)" font-size="11" font-family="system-ui,sans-serif">authorized reputation writes only</text>

  <!-- ─── CONTRACT 2: LeashGatedTransfer ─── -->
  <rect x="420" y="130" width="300" height="320" rx="14" fill="rgb(113,43,19)" fill-opacity="0.12" stroke="rgb(240,153,123)" stroke-width="0.8"/>

  <text x="570" y="158" text-anchor="middle" fill="rgb(245,196,179)" font-size="15" font-weight="600" font-family="system-ui,sans-serif">LeashGatedTransfer.sol</text>
  <text x="570" y="178" text-anchor="middle" fill="rgb(240,153,123)" font-size="12" font-family="system-ui,sans-serif">Trust-gated payment gateway</text>

  <!-- Transfer row 1 -->
  <rect x="438" y="192" width="264" height="50" rx="8" fill="rgb(113,43,19)" fill-opacity="0.22" stroke="rgb(240,153,123)" stroke-width="0.5"/>
  <text x="570" y="210" text-anchor="middle" fill="rgb(245,196,179)" font-size="12" font-weight="500" font-family="system-ui,sans-serif">leashedTransfer(recipient, minScore)</text>
  <text x="570" y="228" text-anchor="middle" fill="rgb(240,153,123)" font-size="11" font-family="system-ui,sans-serif">per-call threshold, CEI enforced</text>

  <!-- Transfer row 2 -->
  <rect x="438" y="252" width="264" height="50" rx="8" fill="rgb(113,43,19)" fill-opacity="0.22" stroke="rgb(240,153,123)" stroke-width="0.5"/>
  <text x="570" y="270" text-anchor="middle" fill="rgb(245,196,179)" font-size="12" font-weight="500" font-family="system-ui,sans-serif">recordTask(username, success)</text>
  <text x="570" y="288" text-anchor="middle" fill="rgb(240,153,123)" font-size="11" font-family="system-ui,sans-serif">authorized callers only</text>

  <!-- Transfer row 3 -->
  <rect x="438" y="312" width="264" height="50" rx="8" fill="rgb(113,43,19)" fill-opacity="0.22" stroke="rgb(240,153,123)" stroke-width="0.5"/>
  <text x="570" y="330" text-anchor="middle" fill="rgb(245,196,179)" font-size="12" font-weight="500" font-family="system-ui,sans-serif">nonReentrant mutex</text>
  <text x="570" y="348" text-anchor="middle" fill="rgb(240,153,123)" font-size="11" font-family="system-ui,sans-serif">blocks reentrancy attacks</text>

  <!-- Transfer row 4 -->
  <rect x="438" y="372" width="264" height="50" rx="8" fill="rgb(113,43,19)" fill-opacity="0.22" stroke="rgb(240,153,123)" stroke-width="0.5"/>
  <text x="570" y="390" text-anchor="middle" fill="rgb(245,196,179)" font-size="12" font-weight="500" font-family="system-ui,sans-serif">setAuthorized() · transferOwnership()</text>
  <text x="570" y="408" text-anchor="middle" fill="rgb(240,153,123)" font-size="11" font-family="system-ui,sans-serif">access control management</text>

  <!-- ─── ARROW: Transfer → Registry (score check) ─── -->
  <line x1="438" y1="277" x2="322" y2="277" stroke="rgb(175,169,236)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="380" y="265" text-anchor="middle" fill="rgb(194,192,182)" font-size="11" font-family="system-ui,sans-serif">resolve + getProfile</text>

  <!-- ─── AGENT A ─── -->
  <rect x="40" y="490" width="300" height="72" rx="12" fill="rgb(68,68,65)" fill-opacity="0.15" stroke="rgb(180,178,169)" stroke-width="0.8"/>
  <text x="190" y="518" text-anchor="middle" fill="rgb(211,209,199)" font-size="14" font-weight="600" font-family="system-ui,sans-serif">Agent A  (caller)</text>
  <text x="190" y="540" text-anchor="middle" fill="rgb(180,178,169)" font-size="12" font-family="system-ui,sans-serif">calls leashedTransfer(recipient, minScore)</text>

  <!-- Arrow: Agent A → LeashGatedTransfer -->
  <path d="M340 510 Q420 460 438 360" fill="none" stroke="rgb(180,178,169)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="430" y="450" text-anchor="middle" fill="rgb(194,192,182)" font-size="11" font-family="system-ui,sans-serif">invoke skill</text>

  <!-- ─── PHRS TRANSFER ─── -->
  <rect x="420" y="490" width="300" height="72" rx="12" fill="rgb(8,80,65)" fill-opacity="0.2" stroke="rgb(93,202,165)" stroke-width="0.8"/>
  <text x="570" y="518" text-anchor="middle" fill="rgb(159,225,203)" font-size="14" font-weight="600" font-family="system-ui,sans-serif">PHRS Transfer</text>
  <text x="570" y="540" text-anchor="middle" fill="rgb(93,202,165)" font-size="12" font-family="system-ui,sans-serif">native .call{value} to recipient wallet</text>

  <!-- Arrow: LeashGatedTransfer → PHRS Transfer -->
  <line x1="570" y1="450" x2="570" y2="488" stroke="rgb(93,202,165)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="630" y="474" text-anchor="middle" fill="rgb(194,192,182)" font-size="11" font-family="system-ui,sans-serif">score ≥ minScore</text>

  <!-- ─── REPUTATION UPDATE ─── -->
  <rect x="230" y="598" width="300" height="48" rx="12" fill="rgb(99,56,6)" fill-opacity="0.15" stroke="rgb(239,159,39)" stroke-width="0.8"/>
  <text x="380" y="618" text-anchor="middle" fill="rgb(250,199,117)" font-size="13" font-weight="600" font-family="system-ui,sans-serif">Reputation update</text>
  <text x="380" y="636" text-anchor="middle" fill="rgb(239,159,39)" font-size="11" font-family="system-ui,sans-serif">recordPaymentSuccess fires before ETH moves (CEI)</text>

  <!-- Arrow: PHRS Transfer → Reputation Update -->
  <path d="M570 562 L570 580 L380 580 L380 596" fill="none" stroke="rgb(194,192,182)" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>

  <!-- Dashed arrow: Reputation Update → AgentRegistry -->
  <path d="M230 622 L190 622 L190 452" fill="none" stroke="rgb(175,169,236)" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)" opacity="0.5"/>

</svg>
